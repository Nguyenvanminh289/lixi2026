<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lì Xì Tết 2026 từ Minh</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Lì xì Tết cho bạn iu của Minh </h1>
      <p>Nhập tên rồi chọn 1 trong 6 tấm lì xì để nhận quà!</p>
    </header>

    <div id="playerInfo" class="player-info" hidden>
      <span id="greeting"></span>
      <!-- Đã khoá chức năng đổi tên theo yêu cầu -->
    </div>

    <div id="cards" class="cards" aria-live="polite">
      <!-- 6 cards generated by JS -->
    </div>

    <div id="result" class="result" aria-live="polite"></div>

    <!-- Buttons area removed per user request -->

    <div id="proof" class="proof" style="margin-top:14px;display:none;padding:10px;border-radius:8px;background:rgba(255,255,255,0.85)">
      <div id="proofText" style="color:var(--dark-red);text-align:center;"></div>
      <!-- CHỈNH ẢNH: Sau khi code xong, bạn chèn ảnh của người trao ở chỗ <img id="proofImage"> -->
      <div style="margin-top:8px;display:flex;justify-content:center;">
          <!-- Demo image: đổi `src` sang file ảnh bạn đã crop (ví dụ: image/minh-cropped.svg) -->
          <img id="proofImage" src="minh.jpeg" alt="Ảnh người trao" style="max-width:180px;border-radius:8px;display:none" />
      </div>
    </div>
  </div>

  <!-- Banner: thông báo vuốt xuống (hiện khi bốc thẻ) -->
  <div id="scrollBanner" style="position:fixed;top:0;left:0;right:0;display:none;background:linear-gradient(135deg,var(--red),#ff6b6b);color:#fff;padding:12px;text-align:center;z-index:100;animation:slideDown 0.5s ease-out">
    👇 Vuốt xuống để xem kết quả và alo ngay cho tôi ! 👇
  </div>

  <!-- Audio elements: autoplay muted để trình duyệt cho phép phát ngay lập tức -->
  <audio id="bgAudio" src="bg.mp3" loop preload="auto" autoplay playsinline></audio>
  <audio id="revealAudio" src="game.mp3" preload="auto"></audio>
  </div>

  <!-- Overlay shown only if browser blocks autoplay; user can tap to enable audio -->
  <div id="audioPrompt" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:2000">
    <div style="background:#fff;padding:18px;border-radius:8px;text-align:center;max-width:320px;margin:0 16px;">
      <p style="margin:0 0 10px;color:#222;font-weight:600">Ý là có tk ngân hàng chưa ????</p>
      <button id="audioEnableBtn" style="padding:8px 14px;border-radius:6px;border:none;background:#ff6b6b;color:#fff;">Có rùi!!!</button>
    </div>
  </div>

  <div id="nameModal" class="modal">
    <div class="modal-content">
      <h2>Nhập tên đi bạn iu dấu :333</h2>
      <input id="playerName" type="text" placeholder="Tên bạn..." />
      <div class="modal-actions">
        <button id="startBtn">Ôk Lét Gô!!!</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
